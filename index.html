<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlanProMax CloudAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app" v-cloak class="h-screen flex flex-col md:flex-row overflow-hidden text-slate-800">

        <div v-if="!accessKey" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-100/50 backdrop-blur-sm p-4 mobile-modal-container">
            <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white mobile-bottom-sheet">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white mx-auto shadow-lg mb-4 text-3xl">
                        <i class="ph-bold ph-shield-check"></i>
                    </div>
                    <h1 class="text-2xl font-black text-slate-800">PlanPro Cloud</h1>
                    <p class="text-sm text-slate-500 mt-2">安全云端同步</p>
                </div>
                
                <div class="space-y-4">
                    <div class="flex bg-slate-100 p-1 rounded-xl mb-4">
                        <button @click="isRegisterMode = false" :class="!isRegisterMode ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all">登录</button>
                        <button @click="isRegisterMode = true" :class="isRegisterMode ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all">注册新账号</button>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">账号 (Access Key)</label>
                        <input type="text" v-model="inputKey" placeholder="输入账号" class="w-full mt-1 border-2 border-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition font-mono font-bold text-slate-700 bg-slate-50">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">密码</label>
                        <input type="password" v-model="inputPassword" @keyup.enter="handleAuth" placeholder="输入密码" class="w-full mt-1 border-2 border-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition font-mono font-bold text-slate-700 bg-slate-50">
                    </div>
                    <button @click="handleAuth" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-200 active:scale-95 text-lg mt-2">
                        {{ isRegisterMode ? '注册并进入' : '登录工作台' }}
                    </button>
                </div>
            </div>
        </div>

        <template v-if="accessKey">
            <aside class="hidden md:flex w-64 bg-white border-r border-slate-200 flex-col z-20 shadow-lg shrink-0">
                <div class="p-6 flex items-center gap-3 border-b border-slate-100 h-16">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-md"><i class="ph ph-check-square-offset text-xl"></i></div>
                    <div class="flex-1 min-w-0">
                        <h1 class="text-lg font-bold tracking-tight text-slate-800 leading-tight">PlanPro</h1>
                        <div class="text-[10px] text-slate-400 font-mono truncate" title="当前账号">👤 {{ accessKey }}</div>
                    </div>
                </div>

                <div class="px-6 py-2">
                    <div class="flex items-center gap-2 text-xs px-3 py-1.5 rounded-lg border transition-colors" :class="syncStatus.class">
                        <i :class="syncStatus.icon"></i><span class="font-bold">{{ syncStatus.text }}</span>
                    </div>
                </div>

                <nav class="flex-1 p-4 space-y-2">
                    <button @click="switchView('dashboard')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'dashboard' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50'">
                        <i class="ph ph-sun text-lg"></i> 今日看板 <span v-if="activeTasks.length > 0" class="ml-auto bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full">{{ activeTasks.length }}</span>
                    </button>
                    <button @click="switchView('templates')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'templates' ? 'bg-purple-50 text-purple-700' : 'text-slate-600 hover:bg-slate-50'">
                        <i class="ph ph-copy text-lg"></i> 任务模板
                    </button>
                    <button @click="switchView('scheduled')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'scheduled' ? 'bg-teal-50 text-teal-700' : 'text-slate-600 hover:bg-slate-50'">
                        <i class="ph ph-clock-countdown text-lg"></i> 定时任务 <span v-if="enabledScheduledCount > 0" class="ml-auto bg-teal-100 text-teal-700 text-[10px] px-2 py-0.5 rounded-full">{{ enabledScheduledCount }}</span>
                    </button>
                    <button @click="switchView('statistics')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'statistics' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-50'">
                        <i class="ph ph-chart-bar text-lg"></i> 数据统计
                    </button>
                </nav>

                <div class="p-4 border-t border-slate-100 bg-slate-50">
                    <div class="text-[10px] font-bold text-slate-400 uppercase mb-2">系统管理</div>
                    <div class="grid grid-cols-2 gap-2">
                        <button @click="exportData" class="flex items-center justify-center gap-1 py-2 bg-white border border-slate-200 rounded-lg text-xs text-slate-600 hover:text-blue-600"><i class="ph ph-download-simple"></i> 备份</button>
                        <button @click="$refs.fileInput.click()" class="flex items-center justify-center gap-1 py-2 bg-white border border-slate-200 rounded-lg text-xs text-slate-600 hover:text-blue-600"><i class="ph ph-upload-simple"></i> 恢复</button>
                        
                        <button @click="$refs.importOldInput.click()" class="hidden col-span-2 flex items-center justify-center gap-1 py-2 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-600 hover:bg-amber-100 font-bold transition-colors"><i class="ph-bold ph-file-arrow-up"></i> 导入旧版 JSON 备份</button>
                        
                        <button @click="logout" class="col-span-2 flex items-center justify-center gap-1 py-2 bg-white border border-red-100 rounded-lg text-xs text-red-500 hover:bg-red-50 font-bold"><i class="ph-bold ph-sign-out"></i> 安全退出</button>
                        <input type="file" ref="fileInput" @change="importData" class="hidden" accept=".json">
                        <input type="file" ref="importOldInput" @change="importOldData" class="hidden" accept=".json">
                    </div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col relative bg-[#f1f5f9] min-w-0 border-r border-slate-200 mobile-pb">

                <template v-if="currentView === 'dashboard'">
                    <header class="h-16 bg-white/90 backdrop-blur px-2 md:px-6 flex justify-between items-center z-10 sticky top-0 border-b border-slate-200 shrink-0 gap-2">
                        <div class="shrink-0">
                            <h2 class="text-lg font-bold text-blue-800">今日看板</h2>
                        </div>

                        <div class="flex items-center justify-center gap-1 md:gap-3 flex-1 min-w-0 overflow-hidden">
                            <button @click="changeDate(-1)" class="w-8 h-8 flex shrink-0 items-center justify-center rounded-lg hover:bg-slate-200 text-slate-600"><i class="ph-bold ph-caret-left"></i></button>
                            <div class="flex flex-col items-center">
                                <div class="relative group w-full text-center">
                                    <input type="date" v-model="viewDate" class="absolute inset-0 opacity-0 cursor-pointer z-10 w-full">
                                    <h2 class="text-xs md:text-lg font-bold text-slate-800 flex items-center justify-center gap-1 cursor-pointer whitespace-nowrap">{{ dateInfo.date }} <i class="ph-fill ph-caret-down text-xs text-slate-400"></i></h2>
                                </div>
                                <div class="text-[10px] md:text-xs text-slate-500 font-medium whitespace-nowrap">{{ dateInfo.week }}</div>
                            </div>
                            <button @click="changeDate(1)" class="w-8 h-8 flex shrink-0 items-center justify-center rounded-lg hover:bg-slate-200 text-slate-600"><i class="ph-bold ph-caret-right"></i></button>
                            <button v-if="viewDate !== today" @click="resetToToday" class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-md font-bold whitespace-nowrap shrink-0">今</button>
                        </div>

                        <div class="flex items-center gap-1 shrink-0">
                            <button @click="toggleAll" class="h-8 w-8 md:h-9 md:w-auto md:px-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-lg text-sm font-medium flex items-center justify-center gap-2 shrink-0">
                                <i :class="isAllExpanded ? 'ph ph-arrows-in-line-vertical' : 'ph ph-arrows-out-line-vertical'"></i>
                                <span class="hidden md:inline">{{ isAllExpanded ? '收起' : '展开' }}</span>
                            </button>
                            <button @click="toggleAiPanel" class="h-9 px-3 bg-rose-50 text-rose-600 hover:bg-rose-100 rounded-lg text-sm font-bold flex items-center gap-1 border border-rose-100 transition-colors">
                                <i class="ph-fill ph-sparkle"></i> <span class="hidden md:inline">AI</span>
                            </button>
                            <button @click="openModal()" class="h-9 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-bold shadow-md shadow-blue-200 flex items-center gap-2"><i class="ph ph-plus-bold"></i>新建</button>
                        </div>
                    </header>

                    <div class="h-12 bg-white/80 backdrop-blur border-b border-slate-200 px-3 md:px-6 flex items-center gap-2 overflow-x-auto scrollbar-hide z-10 sticky top-16 shrink-0 shadow-sm">
                        <button @click="activeGroupId = 'all'" :class="activeGroupId === 'all' ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'" class="px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all flex-shrink-0">
                            <i class="ph-fill ph-squares-four mr-1"></i> 总览
                        </button>
                        <div class="w-px h-5 bg-slate-300 mx-1 flex-shrink-0"></div>
                        <div v-for="g in groups" :key="g.id" class="flex-shrink-0 flex items-center">
                            <button @click="activeGroupId = g.id" :class="activeGroupId === g.id ? 'bg-blue-600 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'" class="pl-4 pr-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all flex items-center gap-2 group">
                                <i class="ph-fill ph-folder text-[14px]" :class="activeGroupId === g.id ? 'text-blue-200' : 'text-slate-400'"></i> {{ g.name }}
                                <i v-if="activeGroupId === g.id" @click.stop="deleteGroup(g.id)" class="ph-bold ph-x hover:text-red-300 ml-1 p-0.5 rounded-full hover:bg-blue-700 transition-colors"></i>
                            </button>
                        </div>
                        <button @click="createGroup" class="px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap text-slate-500 hover:text-blue-600 hover:bg-blue-50 border border-dashed border-slate-300 hover:border-blue-300 flex items-center gap-1 ml-1 flex-shrink-0 transition-all">
                            <i class="ph-bold ph-plus"></i> 新建分组
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto p-4 space-y-3 scroll-smooth pb-32">
                        <div v-for="task in activeTasks" :key="task.id" @click="selectTask(task)" class="task-card bg-white rounded-xl shadow-sm border border-slate-200 relative overflow-hidden cursor-pointer group" :class="{'active': activeTask && activeTask.id === task.id}">
                            <div v-if="isOverdue(task)" class="absolute top-0 left-0 right-0 h-1 bg-red-500 z-10"></div>
                            <div class="p-3 flex items-center gap-1 md:gap-3 relative z-0 min-h-[4rem]">
                                <button @click.stop="task.expanded = !task.expanded" class="shrink-0 text-slate-400 w-5 md:w-6" :class="{'rotate-90': task.expanded}"><i class="ph-bold ph-caret-right text-lg"></i></button>
                                
                                <div class="w-12 md:w-20 shrink-0 flex items-center justify-center bg-slate-100/80 text-slate-500 rounded-lg text-[10px] font-bold py-1.5 truncate border border-slate-100" :title="getGroupName(task.groupId)">
                                    {{ getGroupName(task.groupId) }}
                                </div>

                                <div class="relative w-12 md:w-20 shrink-0" @click.stop>
                                    <select v-model="task.priority" class="w-full appearance-none px-1 md:pl-6 md:pr-1 py-1.5 rounded-lg text-[10px] md:text-xs font-bold border bg-white focus:outline-none text-center md:text-left" :class="getPriorityStyle(task.priority)"><option value="normal">普通</option><option value="urgent">紧急</option><option value="critical">特急</option></select>
                                </div>
                                <div class="relative w-14 md:w-24 shrink-0" @click.stop>
                                    <select v-model="task.status" @change="updateStatus(task)" class="w-full appearance-none px-1 md:pl-6 md:pr-1 py-1.5 rounded-lg text-[10px] md:text-xs font-bold border bg-white focus:outline-none text-center md:text-left" :class="getStatusStyle(task.status)"><option value="todo">未开始</option><option value="doing">进行中</option><option value="done">已完成</option></select>
                                </div>
                                
                                <div class="flex-1 w-0 min-w-0 font-bold text-slate-800 text-sm flex items-center gap-2 pl-1"><span class="truncate block">{{ task.title }}</span><span class="text-[10px] font-normal text-slate-400 font-mono bg-slate-100 px-1 rounded hidden lg:inline shrink-0">{{ formatTimeOnly(task.date) }}</span></div>
                                <div class="flex items-center gap-1 shrink-0 ml-1"><button @click.stop="openModal(task)" class="p-1.5 text-slate-300 hover:text-blue-600 hover:bg-blue-50 rounded"><i class="ph ph-pencil-simple text-lg"></i></button><button @click.stop="deleteTask(task.id)" class="p-1.5 text-slate-300 hover:text-red-600 hover:bg-red-50 rounded"><i class="ph ph-trash text-lg"></i></button></div>
                            </div>
                            <transition name="slide">
                                <div v-if="task.expanded" class="bg-slate-50 border-t border-slate-100 px-4 py-3 ml-[0] md:ml-[3.5rem]" @click.stop>
                                    <div class="space-y-2">
                                        <div v-for="(sub, idx) in task.subtasks" :key="idx" class="flex items-start gap-2"><label class="flex items-center gap-2 cursor-pointer select-none flex-1"><input type="checkbox" :checked="sub.status === 'done'" @change="toggleSubtask(task, sub)" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500"><span class="text-sm text-slate-700 transition-all" :class="{'line-through text-slate-400': sub.status === 'done'}">{{ sub.title }}</span></label><button @click="task.subtasks.splice(idx,1)" class="text-slate-300 hover:text-red-500"><i class="ph ph-x"></i></button></div>
                                    </div>
                                </div>
                            </transition>
                        </div>

                        <div v-if="completedTasks.length > 0" class="pt-8 pb-4">
                            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2"><i class="ph-bold ph-archive"></i> 已完成 <div class="h-px bg-slate-200 flex-1"></div></h3>
                            <div class="space-y-2"><div v-for="task in completedTasks" :key="task.id" @click="selectTask(task)" class="task-card bg-slate-50 border border-slate-200 rounded-lg p-3 flex items-center gap-3 cursor-pointer hover:bg-white transition-all"><button @click.stop="task.status = 'doing'; updateStatus(task)" class="text-green-600 hover:text-green-700"><i class="ph-fill ph-check-circle text-xl"></i></button><div class="flex-1"><div class="text-sm line-through text-slate-500 font-medium">{{ task.title }}</div></div></div></div>
                        </div>
                    </div>
                </template>

                <template v-if="currentView === 'templates'">
                     <header class="h-16 bg-white/90 backdrop-blur px-6 flex justify-between items-center z-10 sticky top-0 border-b border-slate-200 shrink-0">
                        <div><h2 class="text-lg font-bold text-purple-800">任务模板库</h2></div>
                        <button @click="openModal()" class="h-9 px-4 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-sm font-bold flex items-center gap-2"><i class="ph ph-plus-bold"></i>新建</button>
                    </header>
                    <div class="flex-1 overflow-y-auto p-4 space-y-3 pb-20">
                        <div v-for="tmpl in templates" :key="tmpl.id" @click="selectTask(tmpl)" class="task-card template-card bg-white rounded-xl shadow-sm border border-slate-200 p-3 flex items-center gap-3 cursor-pointer relative">
                            <div class="font-bold text-slate-800 text-sm flex-1">{{ tmpl.title }}</div>
                            <div class="flex items-center gap-1"><button @click.stop="openModal(tmpl)" class="p-1.5 text-slate-300 hover:text-purple-600 rounded"><i class="ph ph-pencil-simple text-lg"></i></button><button @click.stop="deleteTask(tmpl.id)" class="p-1.5 text-slate-300 hover:text-red-600 rounded"><i class="ph ph-trash text-lg"></i></button></div>
                        </div>
                    </div>
                </template>

                <template v-if="currentView === 'scheduled'">
                    <header class="h-16 bg-white/90 backdrop-blur px-6 flex justify-between items-center z-10 sticky top-0 border-b border-slate-200 shrink-0">
                        <div><h2 class="text-lg font-bold text-teal-800">定时任务</h2></div>
                        <button @click="openModal()" class="h-9 px-4 bg-teal-600 hover:bg-teal-700 text-white rounded-lg text-sm font-bold flex items-center gap-2"><i class="ph ph-plus-bold"></i>新建</button>
                    </header>
                    <div class="flex-1 overflow-y-auto p-4 space-y-3 pb-20">
                        <div v-for="sch in scheduledTasks" :key="sch.id" @click="selectTask(sch)" class="task-card scheduled-card bg-white rounded-xl shadow-sm border border-slate-200 p-3 flex items-center gap-3 cursor-pointer" :class="{'disabled': !sch.enabled}">
                            <label class="relative inline-flex items-center cursor-pointer shrink-0" @click.stop><input type="checkbox" v-model="sch.enabled" @change="onScheduleToggle(sch)" class="sr-only peer"><div class="w-9 h-5 bg-gray-200 rounded-full peer peer-checked:bg-teal-600"></div></label>
                            <div class="font-bold text-slate-800 text-sm flex-1">{{ sch.title }}</div>
                            <button @click.stop="openModal(sch)" class="p-1.5 text-slate-300 hover:text-teal-600 rounded"><i class="ph ph-pencil-simple text-lg"></i></button>
                            <button @click.stop="deleteTask(sch.id)" class="p-1.5 text-slate-300 hover:text-red-600 rounded"><i class="ph ph-trash text-lg"></i></button>
                        </div>
                    </div>
                </template>

                <template v-if="currentView === 'statistics'">
                    <header class="h-auto md:h-16 bg-white/90 backdrop-blur px-4 md:px-6 flex flex-col md:flex-row justify-between items-center z-10 sticky top-0 border-b border-slate-200 shrink-0 py-2 gap-2">
                        <div><h2 class="text-lg font-bold text-indigo-800">数据统计</h2></div>
                        <div class="flex items-center gap-2"><select v-model="statsRangeType" @change="setStatsRange(statsRangeType)" class="text-xs border rounded p-1"><option value="week">本周</option><option value="month">本月</option></select></div>
                    </header>
                    <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 pb-32">
                         <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100"><div class="text-xs font-bold text-slate-400 uppercase mb-1">总任务</div><div class="text-3xl font-black text-slate-700">{{ statsData.total }}</div></div>
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100"><div class="text-xs font-bold text-green-500 uppercase mb-1">完成率</div><div class="text-3xl font-black text-green-600">{{ statsData.rate }}%</div></div>
                        </div>
                    </div>
                </template>
            </main>

            <aside class="hidden md:flex w-[350px] bg-white border-l border-slate-200 flex-col z-10 shrink-0 h-full shadow-lg">
                <div v-if="showAiPanel" class="flex flex-col h-full bg-rose-50/30">
                     <div class="h-16 border-b border-rose-100 flex items-center justify-between px-6 bg-white shrink-0">
                        <h3 class="font-bold text-rose-600 flex items-center gap-2"><i class="ph-fill ph-sparkle"></i> AI 助手</h3>
                        <button @click="showAiPanel = false" class="text-xs font-bold text-slate-500 hover:text-slate-700 px-2 py-1 rounded hover:bg-slate-100 flex items-center gap-1">返回</button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-4 space-y-4" ref="chatContainer">
                        <div v-for="(msg, index) in chatHistory" :key="index" class="flex gap-3" :class="msg.role === 'user' ? 'flex-row-reverse' : ''">
                            <div class="p-3 rounded-2xl text-sm shadow-sm max-w-[85%]" :class="msg.role === 'user' ? 'bg-blue-600 text-white' : 'bg-white border border-rose-100 text-slate-700'">
                                <div v-if="msg.type === 'text'">{{ msg.content }}</div>
                                <div v-if="msg.type === 'loading'" class="flex gap-1 items-center h-5 px-2">加载中...</div>
                                <div v-if="msg.type === 'task_card'" class="mt-1">
                                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 mb-3 text-left">
                                        <div class="font-bold text-slate-800 text-base mb-1">{{ msg.data.title }}</div>
                                        <div class="text-xs text-slate-500">{{ formatDateTime(msg.data.date) }}</div>
                                    </div>
                                    <div class="flex gap-2">
                                        <button @click="confirmAiTask(msg.data, index)" class="flex-1 bg-rose-600 text-white py-1.5 rounded-lg font-bold text-xs" :disabled="msg.confirmed">{{ msg.confirmed ? '已添加' : '确认' }}</button>
                                        <button @click="chatHistory.splice(index, 1)" class="px-3 py-1.5 bg-slate-100 text-slate-500 rounded-lg text-xs" v-if="!msg.confirmed">取消</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 bg-white border-t border-rose-100 shrink-0">
                        <div class="flex gap-2 items-end bg-slate-50 p-2 rounded-xl border border-rose-100">
                            <textarea v-model="aiInput" @keydown.enter.prevent="sendAiMessage" rows="1" placeholder="输入任务..." class="flex-1 bg-transparent border-none text-sm resize-none py-2 text-slate-700 focus:outline-none"></textarea>
                            <button @click="sendAiMessage" class="p-2 bg-rose-600 text-white rounded-lg"><i class="ph-bold ph-paper-plane-right"></i></button>
                        </div>
                    </div>
                </div>

                <template v-else-if="activeTask">
                    <div class="h-16 border-b border-slate-100 flex items-center px-6 bg-slate-50/80">
                        <h3 class="font-bold text-slate-700 flex items-center gap-2">任务详情</h3>
                    </div>
                    <div class="flex-1 overflow-y-auto p-6 flex flex-col h-full">
                        <div class="mb-6"><h2 class="text-2xl font-black text-slate-800">{{ activeTask.title }}</h2></div>
                        <div class="flex-1 flex flex-col mb-6"><label class="text-xs font-bold text-slate-500 uppercase mb-2">备注</label><textarea v-model="activeTask.note" class="flex-1 w-full bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-sm text-slate-700 focus:outline-none resize-none"></textarea></div>
                    </div>
                </template>
            </aside>

            <nav class="mobile-nav-bar md:hidden">
                <button @click="switchView('dashboard')" class="mobile-nav-item" :class="currentView === 'dashboard' ? 'active' : ''"><i class="ph ph-sun"></i>看板</button>
                <button @click="switchView('templates')" class="mobile-nav-item" :class="currentView === 'templates' ? 'active' : ''"><i class="ph ph-copy"></i>模板</button>
                <button @click="switchView('scheduled')" class="mobile-nav-item" :class="currentView === 'scheduled' ? 'active' : ''"><i class="ph ph-clock-countdown"></i>定时</button>
                <button @click="switchView('statistics')" class="mobile-nav-item" :class="currentView === 'statistics' ? 'active' : ''"><i class="ph ph-chart-bar"></i>统计</button>
            </nav>

            <div v-if="modal.show" class="fixed inset-0 z-50 flex items-center justify-center p-4 mobile-modal-container">
                <div @click="modal.show = false" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg relative flex flex-col max-h-[90vh] overflow-hidden">
                    <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50"><h3 class="font-bold text-lg">{{ modal.isEdit ? '编辑' : '新建' }}</h3><button @click="modal.show = false"><i class="ph ph-x"></i></button></div>
                    <div class="p-6 overflow-y-auto space-y-5">
                        <input v-model="modal.data.title" type="text" class="w-full text-lg font-bold border-b-2 border-slate-200 py-1 focus:border-blue-500 outline-none" placeholder="任务名称">
                        <div><label class="text-xs font-bold text-slate-500 uppercase">所属分组</label><select v-model="modal.data.groupId" class="w-full text-sm border-b-2 border-slate-200 py-2 outline-none bg-white"><option value="">无</option><option v-for="g in groups" :key="g.id" :value="g.id">{{ g.name }}</option></select></div>
                        <div v-if="currentView === 'dashboard'" class="grid grid-cols-2 gap-4"><div><label class="text-xs font-bold text-slate-500 uppercase">计划日期</label><input type="datetime-local" v-model="modal.data.date" class="w-full border rounded px-2 py-2 text-sm"></div></div>
                    </div>
                    <div class="p-4 border-t flex justify-end gap-3 bg-white"><button @click="modal.show = false" class="px-4 py-2 text-slate-600 text-sm">取消</button><button @click="saveTask" class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold shadow">确认</button></div>
                </div>
            </div>
        </template>
    </div>

    <script src="script.js"></script>
</body>
</html>
