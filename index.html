<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlanProMax CloudAI</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PlanPro">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>

    <link rel="stylesheet" href="style.css">

    <style>
        .dark .ql-toolbar { background: #1e293b; border-color: #334155; border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem; }
        .dark .ql-container { border-color: #334155; color: #f8fafc; border-bottom-left-radius: 0.75rem; border-bottom-right-radius: 0.75rem; }
        .dark .ql-editor.ql-blank::before { color: #64748b; }
        .dark .ql-picker-label { color: #cbd5e1; }
        .dark .ql-stroke { stroke: #cbd5e1; }
        .dark .ql-fill { fill: #cbd5e1; }
        .dark .ql-picker-options { background-color: #1e293b; border-color: #334155; }
        
        .ql-toolbar { border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem; }
        .ql-container { border-bottom-left-radius: 0.75rem; border-bottom-right-radius: 0.75rem; font-family: 'Segoe UI', sans-serif; font-size: 15px; }
        .ql-editor { min-height: 250px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-200">

    <div id="app" v-cloak class="h-[100dvh] w-full flex flex-col md:flex-row overflow-hidden text-slate-800 dark:text-slate-200">

        <div v-if="!accessKey" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-100/50 dark:bg-slate-900/80 backdrop-blur-sm p-4 mobile-modal-container">
            <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white dark:border-slate-700 mobile-bottom-sheet">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white mx-auto shadow-lg mb-4 text-3xl">
                        <i class="ph-bold ph-shield-check"></i>
                    </div>
                    <h1 class="text-2xl font-black text-slate-800 dark:text-white">PlanPro Cloud</h1>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">安全云端同步</p>
                </div>
                
                <div class="space-y-4">
                    <div class="flex bg-slate-100 dark:bg-slate-700 p-1 rounded-xl mb-4">
                        <button @click="isRegisterMode = false" :class="!isRegisterMode ? 'bg-white dark:bg-slate-600 shadow text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-white hover:text-slate-700 dark:hover:text-white'" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all">登录</button>
                        <button @click="isRegisterMode = true" :class="isRegisterMode ? 'bg-white dark:bg-slate-600 shadow text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-white hover:text-slate-700 dark:hover:text-white'" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all">注册新账号</button>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase ml-1">账号 (Access Key)</label>
                        <input type="text" v-model="inputKey" placeholder="输入账号" class="w-full mt-1 border-2 border-slate-100 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 dark:focus:border-blue-500 transition font-mono font-bold text-slate-700 dark:text-white bg-slate-50 dark:bg-slate-900/50">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase ml-1">密码 </label>
                        <input type="password" v-model="inputPassword" @keyup.enter="handleAuth" placeholder="输入密码" class="w-full mt-1 border-2 border-slate-100 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 dark:focus:border-blue-500 transition font-mono font-bold text-slate-700 dark:text-white bg-slate-50 dark:bg-slate-900/50">
                    </div>
                    <button @click="handleAuth" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-200 dark:shadow-none active:scale-95 text-lg mt-2">
                        {{ isRegisterMode ? '注册并进入' : '登录工作台' }}
                    </button>
                </div>
            </div>
        </div>

        <template v-if="accessKey">

            <aside class="hidden md:flex w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex-col z-20 shadow-lg shrink-0">
                <div class="p-6 flex items-center gap-3 border-b border-slate-100 dark:border-slate-700/50 h-16">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-md"><i class="ph ph-check-square-offset text-xl"></i></div>
                    <div class="flex-1 min-w-0">
                        <h1 class="text-lg font-bold tracking-tight text-slate-800 dark:text-white leading-tight">PlanPro</h1>
                        <div class="text-[10px] text-slate-400 dark:text-slate-500 font-mono truncate" title="当前账号">👤 {{ accessKey }}</div>
                    </div>
                </div>

                <div class="px-6 py-2">
                    <div class="flex items-center gap-2 text-xs px-3 py-1.5 rounded-lg border transition-colors" :class="syncStatus.class">
                        <i :class="syncStatus.icon"></i><span class="font-bold">{{ syncStatus.text }}</span>
                    </div>
                </div>

                <nav class="flex-1 p-4 space-y-2">
                    <button @click="switchView('dashboard')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'dashboard' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400' : 'text-slate-600 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-700/50'">
                        <i class="ph ph-sun text-lg"></i> 今日看板 <span v-if="activeTasks.length > 0" class="ml-auto bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full">{{ activeTasks.length }}</span>
                    </button>
                    <button @click="switchView('templates')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'templates' ? 'bg-purple-50 dark:bg-purple-900/30 text-purple-700 dark:text-purple-400' : 'text-slate-600 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-700/50'">
                        <i class="ph ph-copy text-lg"></i> 任务模板
                    </button>
                    <button @click="switchView('scheduled')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'scheduled' ? 'bg-teal-50 dark:bg-teal-900/30 text-teal-700 dark:text-teal-400' : 'text-slate-600 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-700/50'">
                        <i class="ph ph-clock-countdown text-lg"></i> 定时任务 <span v-if="enabledScheduledCount > 0" class="ml-auto bg-teal-100 text-teal-700 text-[10px] px-2 py-0.5 rounded-full">{{ enabledScheduledCount }}</span>
                    </button>
                    <button @click="switchView('statistics')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'statistics' ? 'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400' : 'text-slate-600 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-700/50'">
                        <i class="ph ph-chart-bar text-lg"></i> 数据统计
                    </button>
                </nav>

                <div class="p-4 border-t border-slate-100 dark:border-slate-700/50 bg-slate-50 dark:bg-slate-800/50">
                    <div class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase mb-2">系统管理</div>
                    <div class="grid grid-cols-2 gap-2">
                        <button @click="toggleTheme" class="col-span-2 flex items-center justify-center gap-1 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-xs text-slate-600 dark:text-white hover:text-blue-600 font-bold transition-colors">
                            <i :class="isDarkMode ? 'ph-bold ph-sun' : 'ph-bold ph-moon'"></i> {{ isDarkMode ? '切换为浅色模式' : '切换为深色模式' }}
                        </button>
                        
                        <button @click="exportData" class="flex items-center justify-center gap-1 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-xs text-slate-600 dark:text-white hover:text-blue-600"><i class="ph ph-download-simple"></i> 备份</button>
                        <button @click="$refs.fileInput.click()" class="flex items-center justify-center gap-1 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-xs text-slate-600 dark:text-white hover:text-blue-600"><i class="ph ph-upload-simple"></i> 恢复</button>
                        <button @click="$refs.importOldInput.click()" class="col-span-2 flex items-center justify-center gap-1 py-2 bg-amber-50 dark:bg-amber-900/30 border border-amber-200 dark:border-amber-700/50 rounded-lg text-xs text-amber-600 dark:text-amber-400 hover:bg-amber-100 dark:hover:bg-amber-900/50 font-bold transition-colors"><i class="ph-bold ph-file-arrow-up"></i> 导入历史 JSON 备份</button>
                        <button @click="logout" class="col-span-2 flex items-center justify-center gap-1 py-2 bg-white dark:bg-slate-700 border border-red-100 dark:border-red-900/50 rounded-lg text-xs text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 font-bold"><i class="ph-bold ph-sign-out"></i> 安全退出</button>
                        <input type="file" ref="fileInput" @change="importData" class="hidden" accept=".json">
                        <input type="file" ref="importOldInput" @change="importOldData" class="hidden" accept=".json">
                    </div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col relative bg-[#f1f5f9] dark:bg-slate-900 min-w-0 min-h-0 border-r border-slate-200 dark:border-slate-700">
                <template v-if="currentView === 'dashboard'">
                    <header class="h-16 bg-white/90 dark:bg-slate-800/90 backdrop-blur px-2 md:px-6 flex justify-between items-center z-10 sticky top-0 border-b border-slate-200 dark:border-slate-700 shrink-0 gap-2">
                        <div class="shrink-0">
                            <h2 class="text-lg font-bold text-blue-800 dark:text-blue-400">今日看板</h2>
                            <div class="text-[10px] text-slate-400 dark:text-slate-500 hidden md:block">管理您的每日待办</div>
                        </div>

                        <div class="flex items-center justify-center gap-1 md:gap-3 flex-1 min-w-0 overflow-hidden">
                            <button @click="changeDate(-1)" class="w-8 h-8 flex shrink-0 items-center justify-center rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-white"><i class="ph-bold ph-caret-left"></i></button>
                            <div class="flex flex-col items-center">
                                <div class="relative group w-full text-center">
                                    <input type="date" v-model="viewDate" class="absolute inset-0 opacity-0 cursor-pointer z-10 w-full">
                                    <h2 class="text-xs md:text-lg font-bold text-slate-800 dark:text-white flex items-center justify-center gap-1 cursor-pointer whitespace-nowrap">{{ dateInfo.date }} <i class="ph-fill ph-caret-down text-xs text-slate-400"></i></h2>
                                </div>
                                <div class="text-[10px] md:text-xs text-slate-500 dark:text-slate-400 font-medium whitespace-nowrap">{{ dateInfo.week }}</div>
                            </div>
                            <button @click="changeDate(1)" class="w-8 h-8 flex shrink-0 items-center justify-center rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-white"><i class="ph-bold ph-caret-right"></i></button>
                            <button v-if="viewDate !== today" @click="resetToToday" class="text-[10px] bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-1 rounded-md font-bold whitespace-nowrap shrink-0">今</button>
                        </div>

                        <div class="flex items-center gap-1 shrink-0">
                            <button @click="toggleTheme" class="md:hidden h-8 w-8 flex shrink-0 items-center justify-center rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-white transition-colors">
                                <i class="ph-bold" :class="isDarkMode ? 'ph-sun' : 'ph-moon'"></i>
                            </button>
                            <button @click="toggleAll" class="h-8 w-8 md:h-9 md:w-auto md:px-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-600 dark:text-white rounded-lg text-sm font-medium flex items-center justify-center gap-2 shrink-0">
                                <i :class="isAllExpanded ? 'ph ph-arrows-in-line-vertical' : 'ph ph-arrows-out-line-vertical'"></i>
                                <span class="hidden md:inline">{{ isAllExpanded ? '收起' : '展开' }}</span>
                            </button>
                            <button @click="toggleAiPanel" class="h-9 px-3 bg-rose-50 dark:bg-rose-900/20 text-rose-600 dark:text-rose-400 hover:bg-rose-100 dark:hover:bg-rose-900/40 rounded-lg text-sm font-bold flex items-center gap-1 border border-rose-100 dark:border-rose-900/30 transition-colors">
                                <i class="ph-fill ph-sparkle"></i> <span class="hidden md:inline">AI</span>
                            </button>
                            <button @click="openModal()" class="h-9 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-bold shadow-md shadow-blue-200 dark:shadow-none flex items-center gap-2"><i class="ph ph-plus-bold"></i>新建</button>
                        </div>
                    </header>

                    <div class="h-12 bg-white/80 dark:bg-slate-800/80 backdrop-blur border-b border-slate-200 dark:border-slate-700 px-3 md:px-6 flex items-center gap-2 overflow-x-auto scrollbar-hide z-10 sticky top-16 shrink-0 shadow-sm">
                        <button @click="activeGroupId = 'all'" :class="activeGroupId === 'all' ? 'bg-slate-800 dark:bg-slate-100 text-white dark:text-slate-800 shadow-md' : 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-white hover:bg-slate-200 dark:hover:bg-slate-600'" class="px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all flex-shrink-0">
                            <i class="ph-fill ph-squares-four mr-1"></i> 总览
                        </button>
                        
                        <div class="w-px h-5 bg-slate-300 dark:bg-slate-600 mx-1 flex-shrink-0"></div>
                        
                        <div v-for="g in groups" :key="g.id" class="flex-shrink-0 flex items-center">
                            <button @click="activeGroupId = g.id" :class="activeGroupId === g.id ? 'bg-blue-600 text-white shadow-md' : 'bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-700'" class="pl-4 pr-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all flex items-center gap-2 group">
                                <i class="ph-fill ph-folder text-[14px]" :class="activeGroupId === g.id ? 'text-blue-200' : 'text-slate-400 dark:text-slate-500'"></i> {{ g.name }}
                                <i v-if="activeGroupId === g.id" @click.stop="deleteGroup(g.id)" class="ph-bold ph-x hover:text-red-300 ml-1 p-0.5 rounded-full hover:bg-blue-700 transition-colors"></i>
                            </button>
                        </div>
                        
                        <button @click="createGroup" class="px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/30 border border-dashed border-slate-300 dark:border-slate-600 flex items-center gap-1 ml-1 flex-shrink-0 transition-all">
                            <i class="ph-bold ph-plus"></i> 新建分组
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto p-4 space-y-3 scroll-smooth pb-32 min-h-0" style="-webkit-overflow-scrolling: touch;">
                        
                        <div v-if="futurePreviews.length > 0" class="mb-6">
                            <h3 class="text-xs font-bold text-teal-600 dark:text-teal-400 uppercase tracking-wider mb-3 flex items-center gap-2"><i class="ph-fill ph-calendar-plus"></i> 待自动生成 <div class="h-px bg-teal-100 dark:bg-teal-900/50 flex-1"></div></h3>
                            <div v-for="task in futurePreviews" :key="task.id" @click="selectTask(task)" class="task-card future-card bg-slate-50 dark:bg-slate-800/50 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-3 flex items-center gap-3 cursor-pointer"><div class="w-6 flex justify-center text-slate-300 dark:text-slate-500"><i class="ph-bold ph-clock-countdown text-lg"></i></div><div class="font-bold text-slate-600 dark:text-white text-sm">{{ task.title }}</div></div>
                        </div>

                        <div v-if="activeTasks.length === 0 && completedTasks.length === 0 && futurePreviews.length === 0" class="flex flex-col items-center justify-center h-64 text-slate-400 dark:text-slate-500"><i class="ph ph-coffee text-4xl mb-2"></i><p class="text-sm">该视图下暂无任务</p></div>

                        <div v-for="task in activeTasks" :key="task.id" @click="selectTask(task)" 
                            class="task-card bg-white dark:bg-slate-800 rounded-xl relative overflow-hidden cursor-pointer group" 
                            :class="[
                                {'active': activeTask && activeTask.id === task.id},
                                {'urgent-card': task.priority === 'urgent'},
                                {'critical-card': task.priority === 'critical'},
                                task.priority === 'critical' ? 'border-2 border-red-400 dark:border-red-500/50 shadow-md shadow-red-100/50 dark:shadow-red-900/20' : 
                                task.priority === 'urgent' ? 'border-2 border-orange-400 dark:border-orange-500/50 shadow-md shadow-orange-100/50 dark:shadow-orange-900/20' : 
                                'border border-slate-200 dark:border-slate-700 shadow-sm'
                            ]">
                            
                            <div v-if="isOverdue(task)" class="absolute top-0 left-0 right-0 h-1 bg-red-500 z-10"></div>
                            <div class="p-3 flex items-center gap-1 md:gap-3 relative z-0 min-h-[4rem]">
                                <button @click.stop="task.expanded = !task.expanded" class="shrink-0 text-slate-400 dark:text-slate-500 w-5 md:w-6" :class="{'rotate-90': task.expanded}"><i class="ph-bold ph-caret-right text-lg"></i></button>
                                
                                <div class="hidden md:flex w-20 shrink-0 items-center justify-center bg-slate-100/80 dark:bg-slate-700/80 text-slate-500 dark:text-slate-400 rounded-lg text-[10px] font-bold py-1.5 truncate border border-slate-100 dark:border-slate-600/50" :title="getGroupName(task.groupId)">
                                    {{ getGroupName(task.groupId) }}
                                </div>

                                <div class="hidden md:block relative w-20 shrink-0" @click.stop>
                                    <select v-model="task.priority" class="w-full appearance-none pl-6 pr-1 py-1.5 rounded-lg text-xs font-bold border dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none text-left" :class="getPriorityStyle(task.priority)">
                                        <option value="normal" class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200">普通</option>
                                        <option value="urgent" class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200">紧急</option>
                                        <option value="critical" class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200">特急</option>
                                    </select>
                                    <div class="absolute left-2 top-1/2 -translate-y-1/2 pointer-events-none"><i class="ph-fill ph-flag" :class="{'text-blue-500 dark:text-blue-400':task.priority==='normal', 'text-orange-500 dark:text-orange-400':task.priority==='urgent', 'text-red-500 dark:text-red-400':task.priority==='critical'}"></i></div>
                                </div>

                                <div class="relative w-16 md:w-24 shrink-0" @click.stop>
                                    <select v-model="task.status" @change="updateStatus(task)" class="w-full appearance-none px-1 md:pl-6 md:pr-1 py-1.5 rounded-lg text-[10px] md:text-xs font-bold border dark:border-slate-600 focus:outline-none text-center md:text-left transition-colors" :class="getStatusStyle(task.status)">
                                        <option value="todo" class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200">未开始</option>
                                        <option value="doing" class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200">进行中</option>
                                        <option value="done" class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200">已完成</option>
                                    </select>
                                    <div class="absolute left-2 top-1/2 -translate-y-1/2 pointer-events-none hidden md:block"><i v-if="task.status==='todo'" class="ph ph-circle text-slate-400 dark:text-slate-500"></i><i v-if="task.status==='doing'" class="ph ph-spinner animate-spin text-blue-600 dark:text-blue-400"></i><i v-if="task.status==='done'" class="ph ph-check-circle text-green-600 dark:text-green-400"></i></div>
                                </div>
                                
                                <div class="flex-1 w-0 min-w-0 font-bold text-slate-800 dark:text-white text-sm flex items-center gap-2 pl-1"><span class="truncate block">{{ task.title }}</span><span class="text-[10px] font-normal text-slate-400 dark:text-slate-400 font-mono bg-slate-100 dark:bg-slate-700 px-1 rounded hidden lg:inline shrink-0">{{ formatTimeOnly(task.date) }}</span></div>
                                <div class="flex-1 min-w-0 border-l border-slate-200 dark:border-slate-700 pl-3 ml-1 hidden lg:block"><div v-if="task.note" class="text-xs text-slate-400 dark:text-slate-500 truncate font-mono">{{ getLatestNoteLine(task.note) }}</div></div>
                                <div class="flex items-center gap-1 shrink-0 ml-1"><button @click.stop="openModal(task)" class="p-1.5 text-slate-300 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded"><i class="ph ph-pencil-simple text-lg"></i></button><button @click.stop="deleteTask(task.id)" class="p-1.5 text-slate-300 dark:text-slate-500 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 rounded"><i class="ph ph-trash text-lg"></i></button></div>
                            </div>
                            <transition name="slide">

                 class="fixed z-[100] shadow-2xl flex flex-col bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-2xl overflow-hidden transition-all"
                 :style="{ top: (40 + index * 30) + 'px', left: (100 + index * 40) + 'px', width: '600px', maxWidth: '90vw', height: '60vh', minHeight: '400px' }">
                
                <div class="h-12 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-4 bg-white dark:bg-slate-800 shrink-0">
                    <input v-model="editor.data.title" type="text" placeholder="输入文档标题..." class="flex-1 bg-transparent border-none outline-none font-bold text-slate-800 dark:text-white placeholder-slate-400 text-base focus:ring-0 px-0">
                    <button @click="closeMdEditor(index)" class="text-slate-400 hover:text-red-500 ml-4 transition-colors"><i class="ph-bold ph-x text-lg"></i></button>
                </div>

                <div class="flex-1 overflow-hidden relative flex flex-col bg-white dark:bg-slate-800">
                    <div :id="'quill-editor-' + editor.data.id" class="flex-1"></div>
                </div>

                <div class="p-3 border-t border-slate-200 dark:border-slate-700 flex justify-between items-center bg-white dark:bg-slate-800 shrink-0">
                    <div class="text-[10px] text-slate-400 truncate max-w-[200px]">所属任务: {{ editor.targetTask.title }}</div>
                    <div class="flex gap-2">
                        <button @click="closeMdEditor(index)" class="px-4 py-1.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg text-xs font-bold transition-colors">取消</button>
                        <button @click="saveMdDoc(index)" class="px-5 py-1.5 bg-blue-600 text-white rounded-lg text-xs font-bold shadow hover:bg-blue-700 active:scale-95 transition-all flex items-center gap-1">
                            <i class="ph-bold ph-floppy-disk"></i> 保存
                        </button>
                    </div>
                </div>
            </div>

        </template>
    </div>

    <script src="script.js"></script>
