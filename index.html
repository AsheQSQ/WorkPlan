<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlanProMax CloudAI</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PlanPro">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        .dark .ql-toolbar { background: #1e293b; border-color: #334155; border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem; }
        .dark .ql-container { border-color: #334155; color: #f8fafc; border-bottom-left-radius: 0.75rem; border-bottom-right-radius: 0.75rem; }
        .dark .ql-editor.ql-blank::before { color: #64748b; }
        .dark .ql-picker-label { color: #cbd5e1; }
        .dark .ql-stroke { stroke: #cbd5e1; }
        .dark .ql-fill { fill: #cbd5e1; }
        .dark .ql-picker-options { background-color: #1e293b; border-color: #334155; }
        .ql-toolbar { border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem; }
        .ql-container { border-bottom-left-radius: 0.75rem; border-bottom-right-radius: 0.75rem; font-family: 'Segoe UI', sans-serif; font-size: 15px; }
        .ql-editor { min-height: 250px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-200">

    <div id="app" v-cloak class="h-[100dvh] w-full flex flex-col md:flex-row overflow-hidden text-slate-800 dark:text-slate-200">
        <auth-modal v-if="!store.accessKey"></auth-modal>

        <template v-if="store.accessKey">
            <sidebar></sidebar>
            <app-main></app-main>
            <ai-panel></ai-panel>
            <task-modal></task-modal>
            <md-editors></md-editors>
        </template>
    </div>

    <script type="module" src="./js/main.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW 注册成功:', reg.scope);
                }).catch(err => {
                    console.log('SW 注册失败:', err);
                });
            });
        }
    </script>
</body>
</html>
