<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlanProMax CloudAI</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PlanPro">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app" v-cloak class="h-[100dvh] w-full flex flex-col md:flex-row overflow-hidden text-slate-800">

        <div v-if="!accessKey" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-100/50 backdrop-blur-sm p-4 mobile-modal-container">
            <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white mobile-bottom-sheet">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white mx-auto shadow-lg mb-4 text-3xl">
                        <i class="ph-bold ph-shield-check"></i>
                    </div>
                    <h1 class="text-2xl font-black text-slate-800">PlanPro Cloud</h1>
                    <p class="text-sm text-slate-500 mt-2">安全云端同步</p>
                </div>
                
                <div class="space-y-4">
                    <div class="flex bg-slate-100 p-1 rounded-xl mb-4">
                        <button @click="isRegisterMode = false" :class="!isRegisterMode ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all">登录</button>
                        <button @click="isRegisterMode = true" :class="isRegisterMode ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all">注册新账号</button>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">账号</label>
                        <input type="text" v-model="inputKey" placeholder="输入账号" class="w-full mt-1 border-2 border-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 font-mono font-bold bg-slate-50">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">密码 </label>
                        <input type="password" v-model="inputPassword" @keyup.enter="handleAuth" placeholder="输入密码" class="w-full mt-1 border-2 border-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 font-mono font-bold bg-slate-50">
                    </div>
                    <button @click="handleAuth" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition shadow-lg active:scale-95 text-lg mt-2">
                        {{ isRegisterMode ? '注册并进入' : '登录工作台' }}
                    </button>
                </div>
            </div>
        </div>

        <template v-if="accessKey">
            <aside class="hidden md:flex w-64 bg-white border-r border-slate-200 flex-col z-20 shadow-lg shrink-0">
                <div class="p-6 flex items-center gap-3 border-b border-slate-100 h-16">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-md"><i class="ph ph-check-square-offset text-xl"></i></div>
                    <div class="flex-1 min-w-0">
                        <h1 class="text-lg font-bold tracking-tight text-slate-800 leading-tight">PlanPro</h1>
                        <div class="text-[10px] text-slate-400 font-mono truncate">👤 {{ accessKey }}</div>
                    </div>
                </div>

                <div class="px-6 py-2">
                    <div class="flex items-center gap-2 text-xs px-3 py-1.5 rounded-lg border transition-colors" :class="syncStatus.class">
                        <i :class="syncStatus.icon"></i><span class="font-bold">{{ syncStatus.text }}</span>
                    </div>
                </div>

                <nav class="flex-1 p-4 space-y-2">
                    <button @click="switchView('dashboard')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'dashboard' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50'">
                        <i class="ph ph-sun text-lg"></i> 今日看板 <span v-if="activeTasks.length > 0" class="ml-auto bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full">{{ activeTasks.length }}</span>
                    </button>
                    <button @click="switchView('templates')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'templates' ? 'bg-purple-50 text-purple-700' : 'text-slate-600 hover:bg-slate-50'">
                        <i class="ph ph-copy text-lg"></i> 任务模板
                    </button>
                    <button @click="switchView('scheduled')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'scheduled' ? 'bg-teal-50 text-teal-700' : 'text-slate-600 hover:bg-slate-50'">
                        <i class="ph ph-clock-countdown text-lg"></i> 定时任务 <span v-if="enabledScheduledCount > 0" class="ml-auto bg-teal-100 text-teal-700 text-[10px] px-2 py-0.5 rounded-full">{{ enabledScheduledCount }}</span>
                    </button>
                    <button @click="switchView('statistics')" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm font-bold" :class="currentView === 'statistics' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-50'">
                        <i class="ph ph-chart-bar text-lg"></i> 数据统计
                    </button>
                </nav>

                <div class="p-4 border-t border-slate-100 bg-slate-50">
                    <div class="text-[10px] font-bold text-slate-400 uppercase mb-2">系统管理</div>
                    <div class="grid grid-cols-2 gap-2">
                        <button @click="exportData" class="flex items-center justify-center gap-1 py-2 bg-white border border-slate-200 rounded-lg text-xs text-slate-600 hover:text-blue-600"><i class="ph ph-download-simple"></i> 备份</button>
                        <button @click="$refs.fileInput.click()" class="flex items-center justify-center gap-1 py-2 bg-white border border-slate-200 rounded-lg text-xs text-slate-600 hover:text-blue-600"><i class="ph ph-upload-simple"></i> 恢复</button>
                        <button @click="logout()" class="col-span-2 flex items-center justify-center gap-1 py-2 bg-white border border-slate-200 rounded-lg text-xs font-bold transition-colors">安全退出</button>
                        <button @click="deleteAccount" class="col-span-2 flex items-center justify-center gap-1 py-2 bg-red-50 border border-red-100 rounded-lg text-xs text-red-500 font-bold">注销账号</button>
                        <input type="file" ref="fileInput" @change="importData" class="hidden" accept=".json">
                    </div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col relative bg-[#f1f5f9] min-w-0 min-h-0 border-r border-slate-200">
                <template v-if="currentView === 'dashboard'">
                    <header class="h-16 bg-white/90 backdrop-blur px-2 md:px-6 flex justify-between items-center z-10 sticky top-0 border-b border-slate-200 shrink-0 gap-2">
                        <div class="shrink-0">
                            <h2 class="text-lg font-bold text-blue-800">今日看板</h2>
                        </div>

                        <div class="flex items-center justify-center gap-1 md:gap-3 flex-1 min-w-0 overflow-hidden">
                            <button @click="changeDate(-1)" class="w-8 h-8 flex shrink-0 items-center justify-center rounded-lg hover:bg-slate-200"><i class="ph-bold ph-caret-left"></i></button>
                            <div class="flex flex-col items-center">
                                <div class="relative group w-full text-center">
                                    <input type="date" v-model="viewDate" class="absolute inset-0 opacity-0 cursor-pointer z-10 w-full">
                                    <h2 class="text-xs md:text-lg font-bold text-slate-800 flex items-center justify-center gap-1 cursor-pointer whitespace-nowrap">{{ dateInfo.date }} <i class="ph-fill ph-caret-down text-xs text-slate-400"></i></h2>
                                </div>
                                <div class="text-[10px] md:text-xs text-slate-500 font-medium whitespace-nowrap">{{ dateInfo.week }}</div>
                            </div>
                            <button @click="changeDate(1)" class="w-8 h-8 flex shrink-0 items-center justify-center rounded-lg hover:bg-slate-200"><i class="ph-bold ph-caret-right"></i></button>
                        </div>

                        <div class="flex items-center gap-1 shrink-0">
                            <button @click="toggleAiPanel" class="h-9 px-3 bg-rose-50 text-rose-600 hover:bg-rose-100 rounded-lg text-sm font-bold flex items-center gap-1 border border-rose-100 transition-colors">
                                <i class="ph-fill ph-sparkle"></i> <span class="hidden md:inline">AI</span>
                            </button>
                            <button @click="openModal()" class="h-9 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-bold shadow-md shadow-blue-200 flex items-center gap-2"><i class="ph ph-plus-bold"></i>新建</button>
                        </div>
                    </header>

                    <div class="h-12 bg-white/80 backdrop-blur border-b border-slate-200 px-3 md:px-6 flex items-center gap-2 overflow-x-auto scrollbar-hide z-10 sticky top-16 shrink-0 shadow-sm">
                        <button @click="activeGroupId = 'all'" :class="activeGroupId === 'all' ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 text-slate-600'" class="px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">总览</button>
                        <div v-for="g in groups" :key="g.id" class="flex-shrink-0">
                            <button @click="activeGroupId = g.id" :class="activeGroupId === g.id ? 'bg-blue-600 text-white shadow-md' : 'bg-white border border-slate-200'" class="pl-4 pr-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all flex items-center gap-2">
                                {{ g.name }}
                                <i v-if="activeGroupId === g.id" @click.stop="deleteGroup(g.id)" class="ph-bold ph-x hover:text-red-300"></i>
                            </button>
                        </div>
                        <button @click="createGroup" class="px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap text-slate-500 border border-dashed border-slate-300">+ 新建分组</button>
                    </div>

                    <div class="flex-1 overflow-y-auto p-4 space-y-3 scroll-smooth pb-32 min-h-0" style="-webkit-overflow-scrolling: touch;">
                        
                        <div v-for="task in activeTasks" :key="task.id" @click="selectTask(task)" 
                            class="task-card bg-white rounded-xl relative overflow-hidden cursor-pointer" 
                            :class="[
                                {'active': activeTask && activeTask.id === task.id},
                                task.priority === 'critical' ? 'border-2 border-red-400 shadow-md shadow-red-100/50' : 
                                task.priority === 'urgent' ? 'border-2 border-orange-400 shadow-md shadow-orange-100/50' : 
                                'border border-slate-200 shadow-sm'
                            ]">
                            
                            <div class="p-3 flex items-center gap-1 md:gap-3 relative z-0 min-h-[4rem]">
                                <button @click.stop="task.expanded = !task.expanded" class="shrink-0 text-slate-400 w-5 md:w-6" :class="{'rotate-90': task.expanded}"><i class="ph-bold ph-caret-right text-lg"></i></button>
                                
                                <div class="hidden md:flex w-20 shrink-0 items-center justify-center bg-slate-100/80 text-slate-500 rounded-lg text-[10px] font-bold py-1.5 truncate border border-slate-100">
                                    {{ getGroupName(task.groupId) }}
                                </div>

                                <div class="hidden md:block relative w-20 shrink-0" @click.stop>
                                    <select v-model="task.priority" class="w-full appearance-none pl-6 pr-1 py-1.5 rounded-lg text-xs font-bold border bg-white focus:outline-none" :class="getPriorityStyle(task.priority)"><option value="normal">普通</option><option value="urgent">紧急</option><option value="critical">特急</option></select>
                                    <div class="absolute left-2 top-1/2 -translate-y-1/2 pointer-events-none"><i class="ph-fill ph-flag" :class="{'text-blue-500':task.priority==='normal', 'text-orange-500':task.priority==='urgent', 'text-red-500':task.priority==='critical'}"></i></div>
                                </div>

                                <div class="relative w-16 md:w-24 shrink-0" @click.stop>
                                    <select v-model="task.status" @change="updateStatus(task)" class="w-full appearance-none px-1 md:pl-6 md:pr-1 py-1.5 rounded-lg text-[10px] md:text-xs font-bold border bg-white focus:outline-none" :class="getStatusStyle(task.status)"><option value="todo">未开始</option><option value="doing">进行中</option><option value="done">已完成</option></select>
                                </div>
                                
                                <div class="flex-1 w-0 min-w-0 font-bold text-slate-800 text-sm flex items-center gap-2 pl-1">
                                    <span class="truncate block">{{ task.title }}</span>
                                    <span class="text-[10px] font-normal text-slate-400 font-mono bg-slate-100 px-1 rounded hidden lg:inline shrink-0">{{ formatTimeOnly(task.date) }}</span>
                                </div>
                                <div class="flex items-center gap-1 shrink-0 ml-1">
                                    <button @click.stop="openModal(task)" class="p-1.5 text-slate-300 hover:text-blue-600"><i class="ph ph-pencil-simple text-lg"></i></button>
                                    <button @click.stop="deleteTask(task.id)" class="p-1.5 text-slate-300 hover:text-red-600"><i class="ph ph-trash text-lg"></i></button>
                                </div>
                            </div>
                            <transition name="slide">
                                <div v-if="task.expanded" class="bg-slate-50 border-t border-slate-100 px-4 py-3 ml-0 md:ml-[3.5rem]" @click.stop>
                                    <div class="space-y-2">
                                        <div v-for="(sub, idx) in task.subtasks" :key="idx" class="flex items-start gap-2">
                                            <label class="flex items-center gap-2 cursor-pointer flex-1">
                                                <input type="checkbox" :checked="sub.status === 'done'" @change="toggleSubtask(task, sub)" class="w-4 h-4 rounded text-blue-600">
                                                <span class="text-sm text-slate-700" :class="{'line-through text-slate-400': sub.status === 'done'}">{{ sub.title }}</span>
                                            </label>
                                            <button @click="task.subtasks.splice(idx,1)" class="text-slate-300 hover:text-red-500"><i class="ph ph-x"></i></button>
                                        </div>
                                        <div class="flex items-center gap-2 mt-2 pt-2 border-t border-slate-200 border-dashed">
                                            <input type="text" placeholder="添加子步骤..." @keydown.enter="addInlineSubtask(task, $event)" class="bg-transparent text-xs w-full outline-none text-slate-600">
                                        </div>
                                    </div>
                                </div>
                            </transition>
                        </div>
                    </div>
                </template>

                <template v-if="currentView === 'templates' || currentView === 'scheduled' || currentView === 'statistics'">
                    <header class="h-16 bg-white border-b border-slate-200 px-6 flex justify-between items-center shrink-0">
                        <h2 class="text-lg font-bold">{{ currentView === 'templates' ? '任务模板' : (currentView === 'scheduled' ? '定时任务' : '数据统计') }}</h2>
                    </header>
                    <div class="flex-1 overflow-y-auto p-4 pb-32 min-h-0" style="-webkit-overflow-scrolling: touch;">
                        <div v-if="currentView === 'statistics'" class="space-y-6">
                            <div class="flex gap-4">
                                <select v-model="statsGroupId" class="text-xs border border-slate-200 rounded px-2 py-1.5 bg-white font-bold">
                                    <option value="all">全部分组</option>
                                    <option v-for="g in groups" :key="g.id" :value="g.id">{{ g.name }}</option>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm"><div class="text-xs font-bold text-slate-400 mb-1">总任务</div><div class="text-3xl font-black">{{ statsData.total }}</div></div>
                                <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm"><div class="text-xs font-bold text-green-500 mb-1">已完成</div><div class="text-3xl font-black text-green-600">{{ statsData.done }}</div></div>
                            </div>
                            <div class="md:hidden space-y-3">
                                <div v-for="t in statsData.list" :key="t.id" class="bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                    <div class="font-bold text-sm">{{ t.title }}</div>
                                    <div class="text-[10px] text-slate-400 mt-1">状态: {{ getStatsStatusLabel(t) }}</div>
                                </div>
                            </div>
                        </div>
                        
                        </div>
                </template>
            </main>

            <nav class="mobile-nav-bar md:hidden">
                <button @click="switchView('dashboard')" class="mobile-nav-item" :class="currentView === 'dashboard' ? 'active' : ''"><i class="ph ph-sun"></i><span>看板</span></button>
                <button @click="switchView('templates')" class="mobile-nav-item" :class="currentView === 'templates' ? 'active' : ''"><i class="ph ph-copy"></i><span>模板</span></button>
                <button @click="switchView('scheduled')" class="mobile-nav-item" :class="currentView === 'scheduled' ? 'active' : ''"><i class="ph ph-clock-countdown"></i><span>定时</span></button>
                <button @click="switchView('statistics')" class="mobile-nav-item" :class="currentView === 'statistics' ? 'active' : ''"><i class="ph ph-chart-bar"></i><span>统计</span></button>
            </nav>

            <aside v-if="activeTask && !showAiPanel" class="mobile-detail-overlay md:flex md:w-[350px] bg-white border-l border-slate-200 flex-col z-50">
                <div class="h-14 md:h-16 border-b border-slate-100 flex items-center justify-between px-4 bg-white">
                    <button @click="activeTask = null" class="text-slate-500 font-bold flex items-center gap-1"><i class="ph ph-caret-left"></i> 返回</button>
                </div>
                <div class="flex-1 overflow-y-auto p-5 space-y-6">
                    <h2 class="text-2xl font-black text-slate-800">{{ activeTask.title }}</h2>
                    <textarea v-model="activeTask.note" rows="5" placeholder="备注内容..." class="w-full bg-yellow-50/50 p-4 rounded-xl outline-none font-mono text-sm"></textarea>
                </div>
            </aside>

            <aside v-if="showAiPanel" class="mobile-detail-overlay md:flex md:w-[350px] bg-white border-l border-slate-200 flex-col z-50">
                <div class="h-14 border-b border-rose-100 flex items-center justify-between px-4">
                    <button @click="showAiPanel = false" class="text-slate-500 font-bold">返回</button>
                    <div class="font-bold text-rose-600">AI 助手</div>
                </div>
                <div class="flex-1 overflow-y-auto p-4 space-y-4" ref="chatContainerMobile">
                    </div>
                <div class="p-4 border-t border-rose-100">
                    <div class="flex gap-2 bg-slate-50 p-2 rounded-xl">
                        <textarea v-model="aiInput" @keydown.enter.prevent="sendAiMessage" placeholder="输入任务，如：周五开会" class="flex-1 bg-transparent border-none outline-none text-sm resize-none py-2"></textarea>
                        <button @click="sendAiMessage" class="p-2 bg-rose-600 text-white rounded-lg"><i class="ph ph-paper-plane-right"></i></button>
                    </div>
                </div>
            </aside>

            <div v-if="modal.show" class="fixed inset-0 z-50 flex items-center justify-center p-4 mobile-modal-container">
                <div @click="modal.show = false" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg relative flex flex-col max-h-[90vh] mobile-bottom-sheet">
                    <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <h3 class="font-bold">{{ modal.isEdit ? '编辑' : '新建' }}</h3>
                        <button @click="modal.show = false"><i class="ph ph-x"></i></button>
                    </div>
                    <div class="p-6 overflow-y-auto space-y-5">
                        <input v-model="modal.data.title" type="text" class="w-full text-lg font-bold border-b-2 border-slate-200 focus:border-blue-500 outline-none py-2" placeholder="任务名称">
                    </div>
                    <div class="p-4 border-t border-slate-100 flex justify-end gap-3">
                        <button @click="modal.show = false" class="px-4 py-2 text-slate-500">取消</button>
                        <button @click="saveTask" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold">确认</button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script src="script.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW 注册成功:', reg.scope);
                }).catch(err => {
                    console.log('SW 注册失败:', err);
                });
            });
        }
    </script>
</body>
</html>
